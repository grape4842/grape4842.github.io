		/**
		 * 지하철 노선 뱃지 포맷팅 (스크립트 생성 HTML 동기화)
		 */
		function format_metro_badge(line_name, color_var) {
			const badge_style = `style="background-color: var(${color_var})"`;
			const is_numeric_line = /^[1-9]$/.test(line_name);

			if (is_numeric_line) {
				return `<span class="numline metro_line" ${badge_style}>${line_name}<span class="a11y_txt">호선</span></span>`;
			} else {
				return `<span class="longline metro_line" ${badge_style}>${line_name}<span class="a11y_txt">선</span></span>`;
			}
		}

		/**
		 * 정보 업데이트 함수
		 */
		function update_dong_info(dong_key) {
			const data = DONG_DATA[dong_key];
			if (!data) return;
			current_selected_dong = dong_key;

			// 헤더 텍스트 및 기본 정보
			document.getElementById('dong_name').textContent = data.name;
			document.getElementById('leader_name').textContent = data.leader_name;
			document.getElementById('rep_name').textContent = data.rep_name;
			document.getElementById('strategy_keyword').textContent = data.strategy;
			document.getElementById('target_desc').textContent = data.target;

			// 이미지 (Placeholder 처리)
			const hero_img = document.getElementById('dong_image');
			hero_img.src = BASE_IMG_PATH + data.img;
			hero_img.alt = ""; // 장식용 이미지 호환성 유지
			hero_img.onerror = () => {
				hero_img.src = `https://placehold.co/800x400/152c8c/fff?text=${encodeURIComponent(data.name)}`;
				hero_img.alt = "";
			};

			// 주소 (통합 dl 구조로 시멘틱 개선)
			document.getElementById('unified_addr_display').innerHTML = `
				<dt>도로명 : </dt><dd>${data.road_address}</dd>
				<dt>지번 : </dt><dd>${data.jibun_address}</dd>
			`;

			const facility_link_box = document.getElementById('addr_target_container');
			facility_link_box.innerHTML = `
				<div class="facility_name">
					<a href="${data.website_url}" target="_blank" title="새 창 열림" class="facility_link">
						${data.target_facility}
						 <img class="icon" src="../icon/open_in_new_24dp_FFFFFF_FILL1_wght400_GRAD200_OPSz24 (1).svg" alt="">
					</a>
				</div>
				<div class="map_link_group">
					<a href="${KAKAO_MAP_URL}${encodeURIComponent(data.target_facility)}" target="_blank" rel="noopener noreferrer" class="map_link_btn kakao_map_btn" >
						<img alt="${data.target_facility} 카카오맵에서 검색결과 보기" src="https://play-lh.googleusercontent.com/DYeQ02AyIghsirp4ea3oEnyxT3X0GgTZrXYR8G7AN6tRr-9mFcQIJdCUub5VHiWKHA=w480-h960-rw">
					</a>
					<a href="${NAVER_MAP_URL}${encodeURIComponent(data.target_facility)}" target="_blank" rel="noopener noreferrer" class="map_link_btn naver_map_btn" title="새 창 열림">
						<img alt="${data.target_facility} 네이버 지도에서 검색결과 보기" src="https://play-lh.googleusercontent.com/Cewes10AmAykxX9X18sMsyC4aFalv8jsyXigdfydFcgDVDnyzKsgbEtkQ5LhcCftBB1f=w480-h960-rw">
					</a>
				</div>
			`;

			document.getElementById('jurisdiction').textContent = data.jurisdiction_area;
			document.getElementById('infra_church').textContent = data.church_info;

			// 지하철 리스트 (역명 중심 통합 구조)
			const metro_list_el = document.getElementById('subway_list');
			metro_list_el.innerHTML = "";
			data.subway_routes.forEach(station_info => {
				const item = document.createElement('dd');
				item.className = "infra_item";

				// 뱃지들을 모아서 렌더링
				let badges_html = "";
				station_info.lines.forEach(line_info => {
					badges_html += `<i class="badge_wrapper">${format_metro_badge(line_info.id, line_info.color)}</i>`;
				});

				item.innerHTML = `
					${badges_html}
					<span class="station_name">${station_info.station}</span>
				`;
				metro_list_el.appendChild(item);
			});

			// 버스 리스트
			const bus_list_el = document.getElementById('bus_list');
			bus_list_el.innerHTML = "";

			// 버스 타입 정의 및 순서
			const BUS_TYPES = {
				"trunk": { label: "간선", color_var: "--b_bus", order: 1 }, // 3자리수, 파랑
				"branch": { label: "지선", color_var: "--g_bus", order: 2 }, // 4자리수, 초록
				"village": { label: "마을", color_var: "--g_bus", order: 3 }, // 용산XX, 초록
				"circulation": { label: "순환", color_var: "--y_bus", order: 4 }, // 01, 03 등, 노랑
				"express": { label: "광역", color_var: "--r_bus", order: 5 }, // 9XXX, 빨강
				"airport": { label: "공항", color_var: "--airportline", order: 6 }, // 6XXX
				"night": { label: "심야", color_var: "--night_bus", order: 7 }, // NXX
				"incheon": { label: "인천", color_var: "--b_bus", order: 8 }, // 인천 버스
				"gyeonggi": { label: "경기", color_var: "--r_bus", order: 9 } // 경기 버스
			};

			// 다크모드 대응을 위한 심야버스 색상 변수 추가 (root에 없을 경우 대비 직접 스타일 지정 가능하지만 var 사용 권장)
			// root.css에 --night_bus가 없으므로 임시로 --border_color 또는 직접값 사용, 
			// 여기서는 가독성을 위해 별도 style 처리가 나을 수 있으나 
			// 기존 --r_bus 등을 활용하거나 --text_primary와 구분되는 색상 사용. 
			// 심야는 보통 '밤'을 의미하므로 어두운 배경에 밝은 텍스트, 혹은 붉은 계열. 
			// 서울 심야버스는 'N' (Night) -> 보통 브랜드 컬러는 짙은 남색이나, 시인성을 위해 빨강/파랑 등 혼용.
			// 여기서는 data.color_var를 무시하고 타입별 지정 컬러를 따르되, 
			// 기존 데이터에 color_var가 있으면 그걸 우선할지 결정해야 함. 
			// 요청사항: "지선, 간선, 마을버스, 심야 별로 나눠줘" -> 타입별 그룹핑이 우선.

			data.bus_routes.forEach(group => {
				const section = document.createElement('dl');
				section.className = "bus_group";

				// 1. 정류소 이름 (DT)
				const dt = document.createElement('dt');
				dt.className = "bus_stop_title";
				dt.textContent = `🚏 ${group.stop}`;
				section.appendChild(dt);

				// 2. 노선 분류 및 그룹화
				const categorized_routes = {};

				group.routes.forEach(route_num => {
					let type = "branch"; // Default (지선) -> 4자리
					let sort_key = route_num;

					// 분류 로직
					if (route_num.startsWith('N')) type = "night";
					else if (route_num.includes('용산') || route_num.includes('마을')) type = "village";
					else if (/^\d{2}$/.test(route_num)) type = "circulation"; // 02, 03 등
					else if (/^\d{3}$/.test(route_num)) type = "trunk"; // 3자리 (간선)
					else if (/^6\d{3}$/.test(route_num)) type = "airport"; // 60XX (공항)
					else if (/^9\d{3}$/.test(route_num) || /^M/i.test(route_num) || /^1\d{3}$/.test(route_num)) {
						// 9XXX, M버스, 1XXX(경기) -> 일단 광역/경기로 분류. 
						// 서울 지선은 4자리지만 1로 시작하는 4자리가 있는지? -> 1011(지선 있음), 1111(지선).
						// 경기버스는 보통 4자리수 중 서울 버스와 겹치거나, 빨간 버스.
						// 여기서는 서울시내버스 기준이므로 4자리는 기본 '지선'으로 둠.
						// 단, 9xxx는 확실히 광역.
						if (/^9\d{3}$/.test(route_num)) type = "express";
						else type = "branch";
					}
					else type = "branch"; // 나머지 4자리 등은 지선

					if (!categorized_routes[type]) categorized_routes[type] = [];
					categorized_routes[type].push(route_num);
				});

				// 3. 타입 순서대로 렌더링 (DD > UL > LI 구조 또는 DD 내 나열)
				// 기존 구조: DD class="bus_line" x N
				// 변경 구조: 타입별 헤더 없이 뱃지 색상으로 구분? 혹은 줄바꿈?
				// 요청: "나눠줘" -> 시각적 분리 필요.

				// 방법: 타입별로 줄을 나누거나, 타입 라벨을 붙임.
				// <dd class="bus_category_row"><span class="type_label">간선</span> <span class="bus_line">...</span> ...</dd>

				// 3. 타입 순서대로 렌더링 (Div > DT(Badge) + DD(Line) 구조)
				Object.keys(BUS_TYPES).sort((a, b) => BUS_TYPES[a].order - BUS_TYPES[b].order).forEach(type_key => {
					if (categorized_routes[type_key]) {
						// <dl> 직계 자식으로 <div> 사용 가능 (DT/DD 그룹핑)
						const group_div = document.createElement('div');
						group_div.className = "bus_type_group";

						const type_info = BUS_TYPES[type_key];

						// 뱃지 (DT)
						const type_dt = document.createElement('dt');
						type_dt.className = "bus_type_badge bus_line";
						type_dt.textContent = type_info.label;
						type_dt.style.color = `var(${type_info.color_var})`;

						group_div.appendChild(type_dt);

						// 버스 노선 (DD)
						categorized_routes[type_key].forEach(no => {
							const line_dd = document.createElement('dd');
							line_dd.className = "bus_line";
							line_dd.textContent = no;
							line_dd.style.backgroundColor = `var(${type_info.color_var})`;
							line_dd.setAttribute('data-type', type_key); // CSS에서 텍스트 컬러 제어를 위해 속성 추가

							// 접근성 텍스트
							const a11y = document.createElement('span');
							a11y.className = "a11y_txt";
							a11y.textContent = "번";
							line_dd.appendChild(a11y);

							group_div.appendChild(line_dd);
						});
						section.appendChild(group_div);
					}
				});

				bus_list_el.appendChild(section);
			});

			// 주요 시설 리스트 (카테고리형 H4 + 개별 DL 구조)
			const facility_list_el = document.getElementById('facility_list');
			facility_list_el.innerHTML = "";

			if (data.facilities) {
				const categories = Object.keys(data.facilities);
				if (categories.length > 0) {
					categories.forEach(category => {
						const items = data.facilities[category];
						if (items && items.length > 0) {
							// 카테고리 (H4)
							const h4 = document.createElement('h4');
							h4.className = "facility_category_title";
							h4.innerHTML = `🔹 ${category}`;
							facility_list_el.appendChild(h4);

							// 아이템들을 각각 별도의 DL로 생성
							items.forEach(fac => {
								const dl = document.createElement('dl');
								dl.className = "facility_item_dl"; // 개별 아이템용 DL 클래스

								const dt = document.createElement('dt');
								dt.className = "facility_name_dt";
								dt.textContent = fac.name;

								const dd = document.createElement('dd');
								dd.className = "facility_addr_dd";
								dd.textContent = fac.address;

								dl.appendChild(dt);
								dl.appendChild(dd);
								facility_list_el.appendChild(dl);
							});
						}
					});
				} else {
					facility_list_el.innerHTML = '<div class="no_data">등록된 시설 정보가 없습니다.</div>';
				}
			} else {
				facility_list_el.innerHTML = '<div class="no_data">등록된 시설 정보가 없습니다.</div>';
			}

			// 모바일용 요약 텍스트 업데이트 및 닫기
			const mobile_details = document.querySelector('.mobile_dong_details');
			if (mobile_details) {
				const summary_label = mobile_details.querySelector('.selected_summary_name');
				if (summary_label) summary_label.textContent = data.name;
				if (mobile_details.open) mobile_details.open = false;
			}
		}

		/**
		 * 그리드 아이템 채우기 함수
		 */
		function populate_grid(container_id) {
			const container = document.getElementById(container_id);
			if (!container) return;
			container.innerHTML = "";

			const is_mobile = container_id === 'grid_container_mobile';
			const sorted_keys = Object.keys(DONG_DATA).sort((a, b) => DONG_DATA[a].name.localeCompare(DONG_DATA[b].name, 'ko'));

			sorted_keys.forEach((key) => {
				const input_id = `${key}_input_${is_mobile ? 'm' : 'p'}`;
				const label_node = document.createElement('label');
				label_node.className = "dong_label";
				label_node.setAttribute('for', input_id);

				const input_el = document.createElement('input');
				input_el.type = 'radio';
				input_el.name = `dong_selector_${is_mobile ? 'm' : 'p'}`;
				input_el.id = input_id;
				input_el.value = key;
				if (key === current_selected_dong) input_el.checked = true;

				const span_el = document.createElement('span');
				span_el.className = "dong_box";
				span_el.textContent = DONG_DATA[key].name;

				label_node.appendChild(input_el);
				label_node.appendChild(span_el);

				input_el.addEventListener('change', (ev) => {
					update_dong_info(ev.target.value);
					// 동기화 (PC-모바일 간 선택 상태 맞춤)
					const sync_id = `${ev.target.value}_input_${is_mobile ? 'p' : 'm'}`;
					const sync_input = document.getElementById(sync_id);
					if (sync_input) sync_input.checked = true;
				});

				container.appendChild(label_node);
			});
		}

		/**
		 * 네비게이션 구조 렌더링
		 */
		function render_navigation() {
			const nav_wrapper = document.getElementById('dynamic_nav_container');
			const initial_name = DONG_DATA[current_selected_dong]?.name || "행정동 선택하기";

			nav_wrapper.innerHTML = `
				<!-- PC 레이아웃 -->
				<fieldset class="pc_view dong_selector_fieldset pc_dong_selector">
					<legend class="screen_out a11y_txt">용산구 행정동 목록 (PC)</legend>
					<div class="dong_grid" id="grid_container" role="radiogroup"></div>
				</fieldset>

				<!-- 모바일 레이아웃 (details/summary 적용) -->
				<details class="mobile_view mobile_dong_details">
					<summary aria-haspopup="listbox">
						📍 <span>행정동 선택 : </span>
					<span class="selected_summary_name">${initial_name}</span>
					</summary>
					<fieldset class="dong_selector_fieldset">
						<legend class="screen_out a11y_txt">용산구 행정동 목록 (모바일 전용)</legend>
						<div class="dong_grid" id="grid_container_mobile" role="radiogroup"></div>
					</fieldset>
				</details>
			`;

			populate_grid('grid_container');
			populate_grid('grid_container_mobile');
		}

		/**
		 * 현재 동 정보 공유
		 */
		function share_current_dong() {
			const data = DONG_DATA[current_selected_dong];
			const text = `[용산구 전도 가이드] ${data.name}\n${data.strategy}\n\n상세 정보 보기: ${window.location.href}`;

			if (navigator.share) {
				navigator.share({
					title: `용산구 가이드 - ${data.name}`,
					text: text,
					url: window.location.href,
				}).catch(console.error);
			} else {
				navigator.clipboard.writeText(text).then(() => {
					alert(`${data.name} 정보가 복사되었습니다. 나누고 싶은 분에게 전달해 보세요!`);
				});
			}
		}

		/**
		 * 내 주변 행정동 찾기 (Geolocation)
		 */
		function find_my_dong() {
			if (!navigator.geolocation) {
				alert("GPS를 지원하지 않는 브라우저입니다.");
				return;
			}

			navigator.geolocation.getCurrentPosition((pos) => {
				const u_lat = pos.coords.latitude;
				const u_lng = pos.coords.longitude;

				let min_dist = Infinity;
				let nearest_key = "";

				for (const key in DONG_DATA) {
					const d = DONG_DATA[key];
					if (!d.lat) continue;
					const dist = Math.sqrt(Math.pow(u_lat - d.lat, 2) + Math.pow(u_lng - d.lng, 2));
					if (dist < min_dist) {
						min_dist = dist;
						nearest_key = key;
					}
				}

				if (nearest_key) {
					// 해당 동으로 라디오 버튼 선택 및 정보 업데이트
					const input_p = document.getElementById(`${nearest_key}_input_p`);
					const input_m = document.getElementById(`${nearest_key}_input_m`);
					if (input_p) input_p.click();
					if (input_m) input_m.click();

					alert(`가장 가까운 ${DONG_DATA[nearest_key].name}으로 이동합니다.`);
				}
			}, (err) => {
				alert("위치 정보를 가져올 수 없습니다. 권한을 확인해 주세요.");
			});
		}

		/**
		 * 평화의 한마디 (Blessing Message) 무작위 생성
		 */
		function get_blessing_message() {
			const messages = [
				"당신의 발걸음이 머무는 이곳에 하늘의 사랑과 평화가 가득하기를 기원합니다.",
				"용산의 심장 ${dong_name}에서 새로운 인연과 심정적 울림이 시작되길 바랍니다.",
				"참부모님의 사랑으로 온 인류가 한 가족 되는 그날까지, 오늘 하루도 승리하세요!",
				"가장 가까운 곳에 진정한 행복의 열쇠가 있습니다. 용산구 성지 순회를 환영합니다.",
				"당신은 하늘 부모님의 귀한 자녀입니다. 이곳 ${dong_name}에서 축복의 시간을 보내세요."
			];
			const data = DONG_DATA[current_selected_dong];
			const msg = messages[Math.floor(Math.random() * messages.length)].replace("${dong_name}", data.name);
			alert(`🕊️ 축복의 메시지:\n\n"${msg}"`);
		}

		window.onload = () => {
			const sorted_keys = Object.keys(DONG_DATA).sort((a, b) => DONG_DATA[a].name.localeCompare(DONG_DATA[b].name, 'ko'));
			current_selected_dong = sorted_keys[0];

			render_navigation();
			update_dong_info(current_selected_dong);
		};
	</script>
